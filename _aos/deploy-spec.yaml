# Deploy Spec — shaked-wg-agent
# AOS Module 12 format (pre-release convention)
# Status: DEPLOYED — 2026-04-10

project_id: shaked-wg-agent
profile: L0
deployment_status: deployed

target:
  server: waldhomeserver
  host: 10.100.102.2
  user: nimrodw
  deploy_path: /data/projects/shaked-wg-agent
  fallback_host: 100.125.98.56  # Tailscale

runtime:
  language: python
  version: "3.11"
  entry: "python -m shaked_wg_agent"
  install: "pip install -e ."

trigger:
  type: scheduled
  cron_expression: "0 7,13,19 * * *"  # 3x daily: 07:00, 13:00, 19:00
  cron_user: nimrodw
  log_file: /var/log/shaked-wg-agent.log

data:
  persistent_path: /data/projects/shaked-wg-agent/data
  backup: false  # personal project, no backup required

service:
  # Cron-based scheduling — no persistent daemon needed
  type: cron

publish:
  platform: upress_ftps
  ftp_user: mezoohost@nimrod.bio
  ftp_root: /  # mezoohost FTP root = WordPress document root
  upload_path: agents/shaked-wg  # canonical: agents/<project>/
  remote_file: agents/shaked-wg/index.html
  public_url: https://www.nimrod.bio/agents/shaked-wg/index.html
  credentials_source: .env (mezoohost — WordPress root, canonical agents/<project>/ path)

notes: >
  Personal project for Shaked's Basel WG search.
  Cron: 3x daily at 07:00, 13:00, 19:00 on waldhomeserver.
  HTML report auto-published to upress after each scan.
  Project window ends 2026-06-08 — no long-term infrastructure needed.
